<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulateur de Combat</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', sans-serif;
        background: #0f0f1a;
        background-image:
          radial-gradient(ellipse at 20% 50%, rgba(120, 40, 200, 0.08) 0%, transparent 60%),
          radial-gradient(ellipse at 80% 20%, rgba(6, 182, 212, 0.06) 0%, transparent 50%);
        color: #e0e0e0;
        padding: 20px;
        min-height: 100vh;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        background: linear-gradient(165deg, #1a1f35, #15192e);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 24px;
        padding: 44px;
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.4),
          0 24px 80px rgba(0, 0, 0, 0.25);
      }

      h1 {
        text-align: center;
        font-size: 2em;
        font-weight: 800;
        background: linear-gradient(135deg, #67e8f9, #06b6d4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 10px;
      }

      .subtitle {
        text-align: center;
        color: #555;
        margin-bottom: 25px;
        font-size: 0.95em;
        font-weight: 500;
      }

      .nav-tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 28px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 12px;
        padding: 4px;
      }

      .nav-tabs a {
        flex: 1;
        text-align: center;
        padding: 10px 16px;
        border-radius: 9px;
        font-size: 0.78rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        text-decoration: none;
        color: #555;
        transition: all 0.25s;
      }

      .nav-tabs a:hover {
        color: #888;
        background: rgba(255, 255, 255, 0.03);
      }

      .nav-tabs a.active {
        background: rgba(6, 182, 212, 0.12);
        color: #06b6d4;
      }

      .presets {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 25px;
        flex-wrap: wrap;
      }

      .preset-btn {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 8px 16px;
        color: #888;
        border-radius: 10px;
        cursor: pointer;
        font-size: 0.85em;
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        transition: all 0.25s;
      }

      .preset-btn:hover {
        background: rgba(6, 182, 212, 0.08);
        border-color: rgba(6, 182, 212, 0.4);
        color: #06b6d4;
      }

      .setup {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 25px;
        margin-bottom: 25px;
      }

      .army-panel {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 16px;
        padding: 20px;
        backdrop-filter: blur(10px);
      }

      .army-panel.attacker {
        border-top: 3px solid #06b6d4;
      }

      .army-panel.defender {
        border-top: 3px solid #818cf8;
      }

      .army-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 15px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .army-panel h2 {
        font-size: 1.4em;
        margin: 0;
      }

      .attacker h2 {
        color: #06b6d4;
      }

      .defender h2 {
        color: #818cf8;
      }

      .army-summary {
        background: rgba(0, 0, 0, 0.2);
        padding: 10px 15px;
        border-radius: 10px;
        text-align: right;
      }

      .army-summary .power {
        font-size: 1.1em;
        font-weight: bold;
        color: #ffd93d;
      }

      .army-summary .total-units {
        font-size: 0.8em;
        color: #555;
      }

      .section-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 15px;
        color: #555;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.5px;
      }

      .section-header::after {
        content: "";
        flex: 1;
        height: 1px;
        background: rgba(255, 255, 255, 0.06);
      }

      .units-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-bottom: 20px;
      }

      .unit-card {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        padding: 12px;
        text-align: center;
        transition: all 0.25s;
      }

      .unit-card:hover {
        background: rgba(255, 255, 255, 0.04);
        border-color: rgba(255, 255, 255, 0.08);
      }

      .unit-icon {
        font-size: 1.5em;
        margin-bottom: 8px;
      }

      .unit-card label {
        display: block;
        margin-bottom: 8px;
        color: #888;
        font-size: 0.85em;
      }

      .unit-card input {
        width: 100%;
        padding: 8px 12px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        color: #e8e8e8;
        font-size: 1em;
        font-family: 'Inter', sans-serif;
        font-weight: 500;
        text-align: center;
        transition: all 0.25s;
      }

      .unit-card input:focus {
        outline: none;
        border-color: rgba(6, 182, 212, 0.5);
        background: rgba(6, 182, 212, 0.03);
        box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.08);
      }

      .bonus-section {
        background: rgba(0, 0, 0, 0.15);
        border-radius: 12px;
        padding: 15px;
      }

      .bonus-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .bonus-buttons {
        display: flex;
        gap: 8px;
        margin-bottom: 15px;
        flex-wrap: wrap;
      }

      .bonus-btn {
        flex: 1;
        min-width: 80px;
        padding: 10px 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
        color: #888;
        border-radius: 10px;
        cursor: pointer;
        font-size: 0.85em;
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        transition: all 0.25s;
        text-align: center;
      }

      .bonus-btn:hover {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.15);
      }

      .bonus-btn.active {
        background: rgba(16, 185, 129, 0.1);
        border-color: #10b981;
        color: #10b981;
      }

      .attacker .bonus-btn.active {
        background: rgba(6, 182, 212, 0.1);
        border-color: #06b6d4;
        color: #06b6d4;
      }

      .bonus-btn .bonus-duration {
        display: block;
        font-size: 1em;
        margin-bottom: 2px;
      }

      .bonus-btn .bonus-value {
        display: block;
        font-size: 0.9em;
        opacity: 0.8;
      }

      .bonus-item {
        display: flex;
        flex-direction: column;
      }

      .bonus-item label {
        font-size: 0.7rem;
        color: #555;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 5px;
      }

      .bonus-item input {
        padding: 8px 10px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        color: #e8e8e8;
        font-size: 0.9em;
        font-family: 'Inter', sans-serif;
        font-weight: 500;
        transition: all 0.25s;
      }

      .bonus-item input:focus {
        outline: none;
        border-color: rgba(6, 182, 212, 0.5);
        background: rgba(6, 182, 212, 0.03);
        box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.08);
      }

      .button-container {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin: 30px 0;
      }

      button {
        border: none;
        padding: 14px 35px;
        font-size: 0.95rem;
        font-family: 'Inter', sans-serif;
        font-weight: 700;
        color: white;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.25s;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .btn-simulate {
        background: linear-gradient(135deg, #06b6d4, #0891b2);
        box-shadow: 0 4px 20px rgba(6, 182, 212, 0.25);
      }

      .btn-simulate:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 28px rgba(6, 182, 212, 0.35);
      }

      .btn-simulate:active {
        transform: translateY(0);
        box-shadow: 0 2px 12px rgba(6, 182, 212, 0.2);
      }

      .btn-reset {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #555;
      }

      .btn-reset:hover {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.15);
        color: #888;
      }

      .result {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 16px;
        padding: 30px;
        margin-top: 25px;
        backdrop-filter: blur(10px);
      }

      .result h2 {
        color: #ffd93d;
        margin-bottom: 25px;
        text-align: center;
        font-size: 1.5em;
      }

      .forces {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 25px;
      }

      .force-box {
        background: rgba(0, 0, 0, 0.2);
        padding: 20px;
        border-radius: 14px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.04);
      }

      .force-box .label {
        color: #555;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 8px;
      }

      .force-box strong {
        color: #ffd93d;
        font-size: 1.8em;
        font-weight: 700;
      }

      .losses {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 25px;
      }

      .loss-box {
        background: rgba(0, 0, 0, 0.2);
        padding: 20px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.04);
      }

      .loss-box h4 {
        color: #06b6d4;
        margin-bottom: 15px;
        font-size: 1.1em;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .loss-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .loss-item:last-child {
        border-bottom: none;
      }

      .loss-item span {
        color: #888;
      }

      .loss-item strong {
        color: #06b6d4;
        font-size: 1.1em;
      }

      .wounded-section {
        margin-top: 15px;
        padding-top: 15px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
      }

      .wounded-section .wounded-label {
        color: #10b981;
        font-size: 0.85em;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .points {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-top: 25px;
      }

      .point-box {
        background: rgba(0, 0, 0, 0.2);
        padding: 25px;
        border-radius: 14px;
        text-align: center;
        border: 2px solid transparent;
        transition: all 0.3s ease;
      }

      .point-box.winner {
        border-color: #10b981;
        background: rgba(16, 185, 129, 0.08);
      }

      .point-box.loser {
        border-color: #06b6d4;
        background: rgba(6, 182, 212, 0.08);
      }

      .point-box .label {
        color: #555;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 10px;
      }

      .point-box strong {
        font-size: 2.5em;
        color: #ffd93d;
        font-weight: 700;
        display: block;
        margin-bottom: 10px;
      }

      .winner-label {
        color: #10b981;
        font-weight: bold;
        font-size: 0.95em;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      .loser-label {
        color: #06b6d4;
        font-weight: bold;
        font-size: 0.95em;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      .draw-label {
        color: #ffd93d;
        font-weight: bold;
        font-size: 0.95em;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      @media (max-width: 900px) {
        .setup {
          grid-template-columns: 1fr;
        }

        .units-grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }

      @media (max-width: 600px) {
        .units-grid {
          grid-template-columns: 1fr;
        }

        .bonus-grid {
          grid-template-columns: 1fr;
        }

        .forces,
        .losses,
        .points {
          grid-template-columns: 1fr;
        }

        h1 {
          font-size: 1.5em;
        }

        .button-container {
          flex-direction: column;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="nav-tabs">
        <a href="index.html">Distance</a>
        <a href="calc.html" class="active">Combat</a>
      </div>

      <h1>⚔️ Simulateur de Combat</h1>
      <p class="subtitle">Configurez vos armées et lancez la simulation</p>

      <!-- Main setup -->
      <div class="setup">
        <!-- Attacker panel -->
        <div class="army-panel attacker">
          <div class="army-header">
            <h2>⚔️ Attaquant</h2>
            <div class="army-summary">
              <div class="power" id="att-power-display">0</div>
              <div class="total-units" id="att-units-display">0 unités</div>
            </div>
          </div>

          <div class="section-header">🎖️ Unités</div>
          <div class="units-grid">
            <div class="unit-card">
              <div class="unit-icon">🗡️</div>
              <label>Warriors</label>
              <input
                type="number"
                id="att-warrior"
                value="10"
                min="0"
                oninput="updatePowerDisplay()"
              />
            </div>
            <div class="unit-card">
              <div class="unit-icon">🛡️</div>
              <label>Guardians</label>
              <input
                type="number"
                id="att-guardian"
                value="5"
                min="0"
                oninput="updatePowerDisplay()"
              />
            </div>
            <div class="unit-card">
              <div class="unit-icon">🗡️</div>
              <label>Assassins</label>
              <input
                type="number"
                id="att-assassin"
                value="2"
                min="0"
                oninput="updatePowerDisplay()"
              />
            </div>
          </div>

          <div class="section-header">⚔️ Bonus Attaque</div>
          <div class="bonus-buttons">
            <button
              class="bonus-btn"
              data-bonus="attack"
              data-duration="0"
              onclick="setAttackBonus(0, this)"
            >
              <span class="bonus-duration">Aucun</span>
              <span class="bonus-value">+0%</span>
            </button>
            <button
              class="bonus-btn"
              data-bonus="attack"
              data-duration="6"
              onclick="setAttackBonus(5, this)"
            >
              <span class="bonus-duration">6h</span>
              <span class="bonus-value">+5%</span>
            </button>
            <button
              class="bonus-btn"
              data-bonus="attack"
              data-duration="24"
              onclick="setAttackBonus(10, this)"
            >
              <span class="bonus-duration">24h</span>
              <span class="bonus-value">+10%</span>
            </button>
            <button
              class="bonus-btn"
              data-bonus="attack"
              data-duration="48"
              onclick="setAttackBonus(15, this)"
            >
              <span class="bonus-duration">48h</span>
              <span class="bonus-value">+15%</span>
            </button>
          </div>

          <div class="section-header">⚡ Bonus Centre</div>
          <div class="bonus-section">
            <div class="bonus-grid">
              <div class="bonus-item">
                <label>Centre Warrior</label>
                <input
                  type="number"
                  id="att-center-warrior"
                  value="0"
                  min="0"
                  oninput="updatePowerDisplay()"
                />
              </div>
              <div class="bonus-item">
                <label>Centre Guardian</label>
                <input
                  type="number"
                  id="att-center-guardian"
                  value="0"
                  min="0"
                  oninput="updatePowerDisplay()"
                />
              </div>
              <div class="bonus-item">
                <label>Centre Assassin</label>
                <input
                  type="number"
                  id="att-center-assassin"
                  value="0"
                  min="0"
                  oninput="updatePowerDisplay()"
                />
              </div>
              <div class="bonus-item">
                <label>Hôpital</label>
                <input type="number" id="att-hospital" value="0" min="0" />
              </div>
            </div>
          </div>
        </div>

        <!-- Defender panel -->
        <div class="army-panel defender">
          <div class="army-header">
            <h2>🛡️ Défenseur</h2>
            <div class="army-summary">
              <div class="power" id="def-power-display">0</div>
              <div class="total-units" id="def-units-display">0 unités</div>
            </div>
          </div>

          <div class="section-header">🎖️ Unités</div>
          <div class="units-grid">
            <div class="unit-card">
              <div class="unit-icon">🗡️</div>
              <label>Warriors</label>
              <input
                type="number"
                id="def-warrior"
                value="8"
                min="0"
                oninput="updatePowerDisplay()"
              />
            </div>
            <div class="unit-card">
              <div class="unit-icon">🛡️</div>
              <label>Guardians</label>
              <input
                type="number"
                id="def-guardian"
                value="6"
                min="0"
                oninput="updatePowerDisplay()"
              />
            </div>
            <div class="unit-card">
              <div class="unit-icon">🗡️</div>
              <label>Assassins</label>
              <input
                type="number"
                id="def-assassin"
                value="1"
                min="0"
                oninput="updatePowerDisplay()"
              />
            </div>
          </div>

          <div class="section-header">🛡️ Bonus Défense</div>
          <div class="bonus-buttons">
            <button
              class="bonus-btn"
              data-bonus="defense"
              data-duration="0"
              onclick="setDefenseBonus(0, this)"
            >
              <span class="bonus-duration">Aucun</span>
              <span class="bonus-value">+0%</span>
            </button>
            <button
              class="bonus-btn"
              data-bonus="defense"
              data-duration="6"
              onclick="setDefenseBonus(5, this)"
            >
              <span class="bonus-duration">6h</span>
              <span class="bonus-value">+5%</span>
            </button>
            <button
              class="bonus-btn"
              data-bonus="defense"
              data-duration="24"
              onclick="setDefenseBonus(10, this)"
            >
              <span class="bonus-duration">24h</span>
              <span class="bonus-value">+10%</span>
            </button>
            <button
              class="bonus-btn"
              data-bonus="defense"
              data-duration="48"
              onclick="setDefenseBonus(15, this)"
            >
              <span class="bonus-duration">48h</span>
              <span class="bonus-value">+15%</span>
            </button>
          </div>

          <div class="section-header">⚡ Bonus Centre</div>
          <div class="bonus-section">
            <div class="bonus-grid">
              <div class="bonus-item">
                <label>Centre Warrior</label>
                <input
                  type="number"
                  id="def-center-warrior"
                  value="0"
                  min="0"
                  oninput="updatePowerDisplay()"
                />
              </div>
              <div class="bonus-item">
                <label>Centre Guardian</label>
                <input
                  type="number"
                  id="def-center-guardian"
                  value="0"
                  min="0"
                  oninput="updatePowerDisplay()"
                />
              </div>
              <div class="bonus-item">
                <label>Centre Assassin</label>
                <input
                  type="number"
                  id="def-center-assassin"
                  value="0"
                  min="0"
                  oninput="updatePowerDisplay()"
                />
              </div>
              <div class="bonus-item">
                <label>Hôpital</label>
                <input type="number" id="def-hospital" value="0" min="0" />
              </div>
              <div class="bonus-item" style="grid-column: span 2">
                <label>Muraille (%)</label>
                <input
                  type="number"
                  id="def-wall"
                  value="0"
                  min="0"
                  max="100"
                  step="0.1"
                  oninput="updatePowerDisplay()"
                />
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="result" class="result" style="display: none">
        <h2>📊 Résultat du Combat</h2>
        <div id="result-content"></div>
      </div>

      <div class="button-container">
        <button class="btn-reset" onclick="resetForm()">
          🔄 Réinitialiser
        </button>
        <button class="btn-simulate" onclick="simulateCombat()">
          ⚔️ Lancer le Combat
        </button>
      </div>
    </div>

    <script>
      const C = 0.6;
      const BASE_LOSS = 0.2;
      const MAX_LOSS = 0.55;
      const R_THRESHOLD = 2;
      const CENTER_BONUS = 0.03;

      let attackBonusPercent = 0;
      let defenseBonusPercent = 0;

      function setAttackBonus(percent, button) {
        attackBonusPercent = percent;
        document.querySelectorAll(".attacker .bonus-btn").forEach((btn) => {
          btn.classList.remove("active");
        });
        button.classList.add("active");
        updatePowerDisplay();
      }

      function setDefenseBonus(percent, button) {
        defenseBonusPercent = percent;
        document.querySelectorAll(".defender .bonus-btn").forEach((btn) => {
          btn.classList.remove("active");
        });
        button.classList.add("active");
        updatePowerDisplay();
      }

      const UNIT_STATS = {
        WARRIOR: { attack: 25, defense: 22, sante: 200, letalite: 20 },
        GUARDIAN: { attack: 18, defense: 30, sante: 250, letalite: 15 },
        ASSASSIN: { attack: 35, defense: 15, sante: 175, letalite: 30 },
      };

      const BASE_POWER = {
        WARRIOR: 15,
        GUARDIAN: 30,
        ASSASSIN: 90,
      };

      function getHospitalRecoveryRate(level, isAttacker) {
        if (level === 0) return 0;
        return Math.min(0.3 + level * 0.05, 0.8);
      }

      function computeForce(units, position, centerLevels, wallBonus = 0) {
        let total = 0;

        for (const unit of units) {
          const stats = UNIT_STATS[unit.type];
          const centerLevel = centerLevels[unit.type.toLowerCase()] || 0;

          let power = position === "attack" ? stats.attack : stats.defense;
          power *= 1 + centerLevel * CENTER_BONUS;

          if (position === "defense") {
            power *= 1 + wallBonus / 100;
          }

          total += unit.count * power;
        }

        if (position === "attack") {
          total *= 1 + attackBonusPercent / 100;
        } else {
          total *= 1 + defenseBonusPercent / 100;
        }

        return total;
      }

      function calculateAverageLethality(units, centerLevels) {
        let totalPower = 0;
        let totalLethalityPower = 0;

        for (const unit of units) {
          const centerLevel = centerLevels[unit.type.toLowerCase()] || 0;
          const power =
            BASE_POWER[unit.type] * (1 + centerLevel * CENTER_BONUS);
          const stats = UNIT_STATS[unit.type];

          totalPower += unit.count * power;
          totalLethalityPower += unit.count * power * stats.letalite;
        }

        return totalPower > 0 ? totalLethalityPower / totalPower : 0;
      }

      function calculateLossesProportional(units, lossRate, centerLevels) {
        const army = {};
        const power = {};

        for (const unit of units) {
          const centerLevel = centerLevels[unit.type.toLowerCase()] || 0;
          army[unit.type] = unit.count;
          power[unit.type] =
            BASE_POWER[unit.type] * (1 + centerLevel * CENTER_BONUS);
        }

        const total = Object.entries(army).reduce(
          (sum, [u, n]) => sum + n * power[u],
          0,
        );
        const lostPower = total * lossRate;

        const averageLethality = calculateAverageLethality(units, centerLevels);
        const lethalityFactor = 1 + averageLethality / 100;
        const lostPowerEffective = lostPower * lethalityFactor;

        const losses = [];
        for (const unit of units) {
          const ratio =
            total > 0 ? (army[unit.type] * power[unit.type]) / total : 0;
          const lostCount = Math.round(
            (lostPowerEffective * ratio) / power[unit.type],
          );

          const stats = UNIT_STATS[unit.type];
          const santeReduction = stats.sante / 1000;
          const finalLoss = Math.round(lostCount * (1 - santeReduction));

          losses.push({ type: unit.type, count: finalLoss });
        }

        return losses;
      }

      function calculateWounded(losses, hospitalLevel) {
        const recoveryRate = getHospitalRecoveryRate(hospitalLevel, true);
        return losses
          .map((loss) => ({
            type: loss.type,
            count: Math.floor(loss.count * recoveryRate),
          }))
          .filter((u) => u.count > 0);
      }

      function updatePowerDisplay() {
        const attUnits = [
          {
            type: "WARRIOR",
            count: parseInt(document.getElementById("att-warrior").value) || 0,
          },
          {
            type: "GUARDIAN",
            count: parseInt(document.getElementById("att-guardian").value) || 0,
          },
          {
            type: "ASSASSIN",
            count: parseInt(document.getElementById("att-assassin").value) || 0,
          },
        ].filter((u) => u.count > 0);

        const defUnits = [
          {
            type: "WARRIOR",
            count: parseInt(document.getElementById("def-warrior").value) || 0,
          },
          {
            type: "GUARDIAN",
            count: parseInt(document.getElementById("def-guardian").value) || 0,
          },
          {
            type: "ASSASSIN",
            count: parseInt(document.getElementById("def-assassin").value) || 0,
          },
        ].filter((u) => u.count > 0);

        const attCenters = {
          warrior:
            parseInt(document.getElementById("att-center-warrior").value) || 0,
          guardian:
            parseInt(document.getElementById("att-center-guardian").value) || 0,
          assassin:
            parseInt(document.getElementById("att-center-assassin").value) || 0,
        };

        const defCenters = {
          warrior:
            parseInt(document.getElementById("def-center-warrior").value) || 0,
          guardian:
            parseInt(document.getElementById("def-center-guardian").value) || 0,
          assassin:
            parseInt(document.getElementById("def-center-assassin").value) || 0,
        };

        const wallBonus =
          parseFloat(document.getElementById("def-wall").value) || 0;

        const attPower = computeForce(attUnits, "attack", attCenters);
        const defPower = computeForce(
          defUnits,
          "defense",
          defCenters,
          wallBonus,
        );

        const attTotalUnits = attUnits.reduce((sum, u) => sum + u.count, 0);
        const defTotalUnits = defUnits.reduce((sum, u) => sum + u.count, 0);

        document.getElementById("att-power-display").textContent =
          Math.round(attPower).toLocaleString();
        document.getElementById("att-units-display").textContent =
          `${attTotalUnits} unité${attTotalUnits > 1 ? "s" : ""}`;
        document.getElementById("def-power-display").textContent =
          Math.round(defPower).toLocaleString();
        document.getElementById("def-units-display").textContent =
          `${defTotalUnits} unité${defTotalUnits > 1 ? "s" : ""}`;
      }

      function applyPreset(preset) {
        const presets = {
          small: {
            att: { warrior: 5, guardian: 3, assassin: 1 },
            def: { warrior: 4, guardian: 3, assassin: 1 },
          },
          medium: {
            att: { warrior: 15, guardian: 10, assassin: 5 },
            def: { warrior: 12, guardian: 12, assassin: 3 },
          },
          large: {
            att: { warrior: 50, guardian: 30, assassin: 15 },
            def: { warrior: 40, guardian: 35, assassin: 10 },
          },
          balanced: {
            att: { warrior: 20, guardian: 20, assassin: 10 },
            def: { warrior: 20, guardian: 20, assassin: 10 },
          },
          rush: {
            att: { warrior: 10, guardian: 5, assassin: 20 },
            def: { warrior: 15, guardian: 15, assassin: 5 },
          },
        };

        const p = presets[preset];
        if (!p) return;

        document.getElementById("att-warrior").value = p.att.warrior;
        document.getElementById("att-guardian").value = p.att.guardian;
        document.getElementById("att-assassin").value = p.att.assassin;
        document.getElementById("def-warrior").value = p.def.warrior;
        document.getElementById("def-guardian").value = p.def.guardian;
        document.getElementById("def-assassin").value = p.def.assassin;

        updatePowerDisplay();
      }

      function resetForm() {
        const inputs = document.querySelectorAll('input[type="number"]');
        inputs.forEach((input) => {
          if (input.id.includes("wall")) {
            input.value = 0;
          } else if (
            input.id.includes("warrior") &&
            !input.id.includes("center")
          ) {
            input.value = input.id.startsWith("att") ? 10 : 8;
          } else if (
            input.id.includes("guardian") &&
            !input.id.includes("center")
          ) {
            input.value = input.id.startsWith("att") ? 5 : 6;
          } else if (
            input.id.includes("assassin") &&
            !input.id.includes("center")
          ) {
            input.value = input.id.startsWith("att") ? 2 : 1;
          } else {
            input.value = 0;
          }
        });

        attackBonusPercent = 0;
        defenseBonusPercent = 0;

        document.querySelectorAll(".bonus-btn").forEach((btn) => {
          btn.classList.remove("active");
        });

        document
          .querySelector(".attacker .bonus-btn[data-duration='0']")
          .classList.add("active");
        document
          .querySelector(".defender .bonus-btn[data-duration='0']")
          .classList.add("active");

        document.getElementById("result").style.display = "none";
        updatePowerDisplay();
      }

      document.addEventListener("DOMContentLoaded", function () {
        document
          .querySelector(".attacker .bonus-btn[data-duration='0']")
          .classList.add("active");
        document
          .querySelector(".defender .bonus-btn[data-duration='0']")
          .classList.add("active");
        updatePowerDisplay();
      });

      function simulateCombat() {
        const attackerUnits = [
          {
            type: "WARRIOR",
            count: parseInt(document.getElementById("att-warrior").value) || 0,
          },
          {
            type: "GUARDIAN",
            count: parseInt(document.getElementById("att-guardian").value) || 0,
          },
          {
            type: "ASSASSIN",
            count: parseInt(document.getElementById("att-assassin").value) || 0,
          },
        ].filter((u) => u.count > 0);

        const defenderUnits = [
          {
            type: "WARRIOR",
            count: parseInt(document.getElementById("def-warrior").value) || 0,
          },
          {
            type: "GUARDIAN",
            count: parseInt(document.getElementById("def-guardian").value) || 0,
          },
          {
            type: "ASSASSIN",
            count: parseInt(document.getElementById("def-assassin").value) || 0,
          },
        ].filter((u) => u.count > 0);

        const attCenters = {
          warrior:
            parseInt(document.getElementById("att-center-warrior").value) || 0,
          guardian:
            parseInt(document.getElementById("att-center-guardian").value) || 0,
          assassin:
            parseInt(document.getElementById("att-center-assassin").value) || 0,
        };

        const defCenters = {
          warrior:
            parseInt(document.getElementById("def-center-warrior").value) || 0,
          guardian:
            parseInt(document.getElementById("def-center-guardian").value) || 0,
          assassin:
            parseInt(document.getElementById("def-center-assassin").value) || 0,
        };

        const attHospital =
          parseInt(document.getElementById("att-hospital").value) || 0;
        const defHospital =
          parseInt(document.getElementById("def-hospital").value) || 0;
        const wallBonus =
          parseFloat(document.getElementById("def-wall").value) || 0;

        const forceA = computeForce(attackerUnits, "attack", attCenters);
        const forceB = computeForce(
          defenderUnits,
          "defense",
          defCenters,
          wallBonus,
        );

        let lossA, lossB;
        if (forceA === forceB) {
          lossA = lossB = BASE_LOSS;
        } else if (forceA > forceB) {
          const R = forceA / forceB;
          lossB =
            R <= R_THRESHOLD
              ? BASE_LOSS + (R - 1) * (MAX_LOSS - BASE_LOSS)
              : MAX_LOSS;
          lossA = lossB * (forceB / forceA) * C;
        } else {
          const R = forceB / forceA;
          lossA =
            R <= R_THRESHOLD
              ? BASE_LOSS + (R - 1) * (MAX_LOSS - BASE_LOSS)
              : MAX_LOSS;
          lossB = lossA * (forceA / forceB) * C;
        }

        const attackerLosses = calculateLossesProportional(
          attackerUnits,
          lossA,
          attCenters,
        );
        const defenderLosses = calculateLossesProportional(
          defenderUnits,
          lossB,
          defCenters,
        );

        const attackerWounded = calculateWounded(attackerLosses, attHospital);
        const defenderWounded = calculateWounded(defenderLosses, defHospital);

        const attackerWon = forceA > forceB;
        const isDraw = forceA === forceB;

        function computePointsWithStats(losses, centerLevels, useMax) {
          let total = 0;

          for (const loss of losses) {
            const stats = UNIT_STATS[loss.type];
            const centerLevel = centerLevels[loss.type.toLowerCase()] || 0;

            const attackWithBonus =
              stats.attack * (1 + centerLevel * CENTER_BONUS);
            const defenseWithBonus =
              stats.defense * (1 + centerLevel * CENTER_BONUS);
            const letaliteWithBonus =
              stats.letalite * (1 + centerLevel * CENTER_BONUS);
            const santeWithBonus =
              (stats.sante / 10) * (1 + centerLevel * CENTER_BONUS);

            const values = [
              attackWithBonus,
              defenseWithBonus,
              letaliteWithBonus,
              santeWithBonus,
            ];
            const statValue = useMax
              ? Math.max(...values)
              : Math.min(...values);

            total += loss.count * statValue;
          }

          return total;
        }

        const lossesA_obj = attackerLosses.map((l) => ({
          type: l.type,
          count: l.count,
        }));
        const lossesB_obj = defenderLosses.map((l) => ({
          type: l.type,
          count: l.count,
        }));

        let ptsA, ptsB;

        if (isDraw) {
          const ptsA_max = computePointsWithStats(
            lossesB_obj,
            defCenters,
            true,
          );
          const ptsA_min = computePointsWithStats(
            lossesB_obj,
            defCenters,
            false,
          );
          const ptsB_max = computePointsWithStats(
            lossesA_obj,
            attCenters,
            true,
          );
          const ptsB_min = computePointsWithStats(
            lossesA_obj,
            attCenters,
            false,
          );

          ptsA = Math.round((ptsA_max + ptsA_min) / 2);
          ptsB = Math.round((ptsB_max + ptsB_min) / 2);
        } else if (attackerWon) {
          ptsA = Math.round(
            computePointsWithStats(lossesB_obj, defCenters, true),
          );
          ptsB = Math.round(
            computePointsWithStats(lossesA_obj, attCenters, false),
          );
        } else {
          ptsA = Math.round(
            computePointsWithStats(lossesB_obj, attCenters, false),
          );
          ptsB = Math.round(
            computePointsWithStats(lossesA_obj, defCenters, true),
          );
        }

        if (isDraw) {
          const maxPoints = Math.max(ptsA, ptsB);
          const pointsNul = Math.round((maxPoints * 0.75) / 2);
          ptsA = pointsNul;
          ptsB = pointsNul;
        } else if (attackerWon) {
          ptsA = Math.round(ptsA * 1.25);
          ptsB = Math.round(ptsB * 0.75);
        } else {
          ptsA = Math.round(ptsA * 0.75);
          ptsB = Math.round(ptsB * 1.25);
        }

        if (ptsA > 2.2 * ptsB) ptsA = Math.round(2.2 * ptsB);
        if (ptsB > 2.2 * ptsA) ptsB = Math.round(2.2 * ptsA);

        displayResults({
          forceA,
          forceB,
          attackerLosses,
          defenderLosses,
          attackerWounded,
          defenderWounded,
          ptsA,
          ptsB,
          attackerWon,
          isDraw: forceA === forceB,
        });

        updatePowerDisplay();
      }

      function displayResults(result) {
        const resultDiv = document.getElementById("result");
        const contentDiv = document.getElementById("result-content");

        const formatUnit = (type) => {
          const names = {
            WARRIOR: "Warrior",
            GUARDIAN: "Guardian",
            ASSASSIN: "Assassin",
          };
          return names[type] || type;
        };

        let html = `
          <div class="forces">
            <div class="force-box">
              <div class="label">Force Attaquant</div>
              <strong>${Math.round(result.forceA).toLocaleString()}</strong>
            </div>
            <div class="force-box">
              <div class="label">Force Défenseur</div>
              <strong>${Math.round(result.forceB).toLocaleString()}</strong>
            </div>
          </div>

          <div class="losses">
            <div class="loss-box">
              <h4>⚔️ Pertes Attaquant</h4>
              ${result.attackerLosses
                .map(
                  (l) => `
                    <div class="loss-item">
                      <span>${formatUnit(l.type)}</span>
                      <strong>${l.count}</strong>
                    </div>
                  `,
                )
                .join("")}
              ${
                result.attackerWounded.length > 0
                  ? `
                  <div class="wounded-section">
                    <div class="wounded-label">💚 Blessés récupérables:</div>
                    ${result.attackerWounded
                      .map(
                        (w) => `
                          <div class="loss-item">
                            <span>${formatUnit(w.type)}</span>
                            <strong>${w.count}</strong>
                          </div>
                        `,
                      )
                      .join("")}
                  </div>
                `
                  : ""
              }
            </div>
            <div class="loss-box">
              <h4>🛡️ Pertes Défenseur</h4>
              ${result.defenderLosses
                .map(
                  (l) => `
                    <div class="loss-item">
                      <span>${formatUnit(l.type)}</span>
                      <strong>${l.count}</strong>
                    </div>
                  `,
                )
                .join("")}
              ${
                result.defenderWounded.length > 0
                  ? `
                  <div class="wounded-section">
                    <div class="wounded-label">💚 Blessés récupérables:</div>
                    ${result.defenderWounded
                      .map(
                        (w) => `
                          <div class="loss-item">
                            <span>${formatUnit(w.type)}</span>
                            <strong>${w.count}</strong>
                          </div>
                        `,
                      )
                      .join("")}
                  </div>
                `
                  : ""
              }
            </div>
          </div>

          <div class="points">
            <div class="point-box ${result.attackerWon ? "winner" : result.isDraw ? "" : "loser"}">
              <div class="label">Attaquant</div>
              <strong>${result.ptsA.toLocaleString()}</strong>
              ${
                result.isDraw
                  ? '<div class="draw-label">⚖️ MATCH NUL</div>'
                  : result.attackerWon
                    ? '<div class="winner-label">🏆 GAGNANT</div>'
                    : '<div class="loser-label">❌ PERDANT</div>'
              }
            </div>
            <div class="point-box ${!result.attackerWon && !result.isDraw ? "winner" : result.isDraw ? "" : "loser"}">
              <div class="label">Défenseur</div>
              <strong>${result.ptsB.toLocaleString()}</strong>
              ${
                result.isDraw
                  ? '<div class="draw-label">⚖️ MATCH NUL</div>'
                  : !result.attackerWon
                    ? '<div class="winner-label">🏆 GAGNANT</div>'
                    : '<div class="loser-label">❌ PERDANT</div>'
              }
            </div>
          </div>
        `;

        contentDiv.innerHTML = html;
        resultDiv.style.display = "block";
      }
    </script>
  </body>
</html>
